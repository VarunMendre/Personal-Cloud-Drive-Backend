service: StorageApp-Serverless

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-south-1 # CHANGE THIS to your preferred region (e.g., ap-south-1 for Mumbai)
  memorySize: 512 # Adjust based on your app's needs
  timeout: 30 # Adjust based on your app's needs
  httpApi:
    # We disable CORS here because it's handled in app.js via the 'cors' middleware.
    # Leaving it 'true' or '*' conflicts with credentials: true.
    # cors: true 

functions:
  api:
    handler: lamda.handler
    events:
      - httpApi:
          path: /directory/{proxy+}
          method: '*'
      - httpApi:
          path: /file/{proxy+}
          method: '*'
      - httpApi:
          path: /share/{proxy+}
          method: '*'
      - httpApi:
          path: /subscriptions/{proxy+}
          method: '*'
      - httpApi:
          path: /webhooks/{proxy+}
          method: '*'
      - httpApi:
          path: /user
          method: GET
      - httpApi:
          path: /user/profile
          method: '*'
      - httpApi:
          path: /user/profile/picture-upload-url
          method: GET
      - httpApi:
          path: /users/{proxy+}
          method: '*'
      - httpApi:
          path: /import/{proxy+}
          method: '*'
      - httpApi:
          path: /list
          method: GET
      - httpApi:
          path: /
          method: GET

  auth:
    handler: auth-lamda.handler
    memorySize: 1024 # More memory for bcrypt operations
    events:
      - httpApi:
          path: /auth/{proxy+}
          method: '*'
      - httpApi:
          path: /user/register
          method: POST
      - httpApi:
          path: /user/login
          method: POST
      - httpApi:
          path: /user/set-password
          method: POST
      - httpApi:
          path: /user/change-password
          method: POST
      - httpApi:
          path: /user/logout
          method: POST
      - httpApi:
          path: /user/logout-all
          method: POST
      - httpApi:
          path: /user/has-password
          method: GET

package:
  # This ensures we only upload what's necessary to keep the package small
  patterns:
    - "!**"
    - "app.js"
    - "lamda.js"
    - "package.json"
    - "config/**"
    - "controllers/**"
    - "middlewares/**"
    - "models/**"
    - "routes/**"
    - "services/**"
    - "utils/**"
    - "validators/**"
    - "node_modules/**"
    - "package-lock.json"
    - "!.git/**"
    - "!.env" # Excluded because you will add variables manually
    - "!test/**"
    - "!StorageApp-Serverless/**"
