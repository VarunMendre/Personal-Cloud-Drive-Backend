service: StorageApp-Serverless
useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-south-1
  memorySize: 512
  timeout: 60

  environment:
    DB_URL: ${env:DB_URL, ""}
    REDIS_HOST: ${env:REDIS_HOST, ""}
    REDIS_PORT: ${env:REDIS_PORT, ""}
    REDIS_PASSWORD: ${env:REDIS_PASSWORD, ""}
    REDIS_USERNAME: ${env:REDIS_USERNAME, "default"}
    MY_SECRET_KEY: ${env:MY_SECRET_KEY, ""}
    CLIENT_ORIGIN: ${env:CLIENT_ORIGIN, ""}
    BUCKET_NAME: ${env:BUCKET_NAME, ""}

  httpApi:
    cors:
      allowedOrigins:
        - https://cloudvault.cloud
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      allowCredentials: true

functions:
  # Main API handler
  api:
    handler: lamda.handler
    timeout: 60
    events:
      - httpApi: "*"

  # Auth specific handler
  auth:
    handler: auth-lamda.handler
    memorySize: 1024
    timeout: 60
    events:
      - httpApi:
          path: /user/register
          method: "*"
      - httpApi:
          path: /user/login
          method: "*"
      - httpApi:
          path: /user/set-password
          method: "*"
      - httpApi:
          path: /user/change-password
          method: "*"

package:
  patterns:
    - "!**"
    - "app.js"
    - "lamda.js"
    - "auth-lamda.js"
    - "package.json"
    - "package-lock.json"
    - "config/**"
    - "controllers/**"
    - "middlewares/**"
    - "models/**"
    - "routes/**"
    - "services/**"
    - "utils/**"
    - "validators/**"
    - "node_modules/**"
    - "!.git/**"
    - "!.env"
    - "!test/**"
    - "!StorageApp-Serverless/**"
