service: StorageApp-Serverless
useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-south-1
  memorySize: 512
  timeout: 30
  environment:
    # Adding essential env vars here ensures both Lambdas have them
    DB_URL: ${env:DB_URL, ""}
    REDIS_HOST: ${env:REDIS_HOST, ""}
    REDIS_PORT: ${env:REDIS_PORT, ""}
    REDIS_PASSWORD: ${env:REDIS_PASSWORD, ""}
    REDIS_USERNAME: ${env:REDIS_USERNAME, "default"}
    MY_SECRET_KEY: ${env:MY_SECRET_KEY, ""}
    CLIENT_ORIGIN: ${env:CLIENT_ORIGIN, ""}
    BUCKET_NAME: ${env:BUCKET_NAME, ""}
  httpApi:
    # We disable CORS here because it's handled in app.js via the 'cors' middleware.
    # Leaving it 'true' or '*' conflicts with credentials: true.
    # cors: true 

functions:
  api:
    handler: lamda.handler
    timeout: 60
    memorySize: 512
    events:
      - httpApi:
          path: /
          method: '*'
      - httpApi:
          path: /{proxy+}
          method: '*'

package:
  # This ensures we only upload what's necessary to keep the package small
  patterns:
    - "!**"
    - "app.js"
    - "lamda.js"
    - "auth-lamda.js"
    - "package.json"
    - "config/**"
    - "controllers/**"
    - "middlewares/**"
    - "models/**"
    - "routes/**"
    - "services/**"
    - "utils/**"
    - "validators/**"
    - "node_modules/**"
    - "package-lock.json"
    - "!.git/**"
    - "!.env" # Excluded because you will add variables manually
    - "!test/**"
    - "!StorageApp-Serverless/**"
