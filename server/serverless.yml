service: StorageApp-Serverless

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-south-1 
  memorySize: 1024 # High memory for all operations, including CPU-intensive bcrypt
  timeout: 30 # Adjust based on your app's needs
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
            - s3:DeleteObject
            - s3:ListBucket
          Resource: 
            - "arn:aws:s3:::storageapp-backend-s3-bucket"
            - "arn:aws:s3:::storageapp-backend-s3-bucket/*"
  httpApi:
    cors:
      allowedOrigins:
        - https://cloudvault.cloud
        - https://www.cloudvault.cloud
        - https://app.cloudvault.cloud
      allowedHeaders:
        - Content-Type
        - Authorization
        - set-cookie
        - Accept
        - Origin
        - X-Requested-With
        - dirname
        - x-share-token
        - x-razorpay-signature
        - x-hub-signature-256
      allowedMethods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
        - HEAD
      allowCredentials: true
      maxAge: 600 # 10 minutes cache for preflight

functions:
  api:
    handler: lamda.handler
    events:
      - httpApi: '*' # Catch-all for Express routes

  subscriptionProcessor:
    handler: handlers/cronHandlers.subscriptionProcessor
    events:
      - schedule: cron(0 0 * * ? *) # Daily at Midnight

  trialProcessor:
    handler: handlers/cronHandlers.trialProcessor
    events:
      - schedule: rate(1 hour) # Every hour

  uploadCleanup:
    handler: handlers/cronHandlers.uploadCleanup
    events:
      - schedule: cron(0 3 * * ? *) # Daily at 3 AM

package:
  # This ensures we only upload what's necessary to keep the package small
  patterns:
    - "!**"
    - "app.js"
    - "lamda.js"
    - "package.json"
    - "config/**"
    - "controllers/**"
    - "cron-jobs/**"
    - "handlers/**"
    - "middlewares/**"
    - "models/**"
    - "routes/**"
    - "services/**"
    - "utils/**"
    - "validators/**"
    - "node_modules/**"
    - "package-lock.json"
    - "!.git/**"
    - "!.env" # Excluded because you will add variables manually
    - "!test/**"
    - "!StorageApp-Serverless/**"