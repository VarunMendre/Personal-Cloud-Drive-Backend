service: StorageApp-Serverless
useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-south-1
  memorySize: 512
  timeout: 30
  environment:
    # Adding essential env vars here ensures both Lambdas have them
    DB_URL: ${env:DB_URL, ""}
    REDIS_HOST: ${env:REDIS_HOST, ""}
    REDIS_PORT: ${env:REDIS_PORT, ""}
    REDIS_PASSWORD: ${env:REDIS_PASSWORD, ""}
    REDIS_USERNAME: ${env:REDIS_USERNAME, "default"}
    MY_SECRET_KEY: ${env:MY_SECRET_KEY, ""}
    CLIENT_ORIGIN: ${env:CLIENT_ORIGIN, ""}
    BUCKET_NAME: ${env:BUCKET_NAME, ""}
  httpApi:
    # We disable CORS here because it's handled in app.js via the 'cors' middleware.
    # Leaving it 'true' or '*' conflicts with credentials: true.
    # cors: true 

functions:
  api:
    handler: lamda.handler
    events:
      - httpApi:
          path: /directory/{proxy+}
          method: '*'
      - httpApi:
          path: /file/{proxy+}
          method: '*'
      - httpApi:
          path: /share/{proxy+}
          method: '*'
      - httpApi:
          path: /subscriptions/{proxy+}
          method: '*'
      - httpApi:
          path: /webhooks/{proxy+}
          method: '*'
      - httpApi:
          path: /user
          method: GET
      - httpApi:
          path: /user/profile
          method: '*'
      - httpApi:
          path: /user/profile/picture-upload-url
          method: GET
      - httpApi:
          path: /users/{proxy+}
          method: '*'
      - httpApi:
          path: /import/{proxy+}
          method: '*'
      - httpApi:
          path: /list
          method: GET
      - httpApi:
          path: /
          method: GET

  auth:
    handler: auth-lamda.handler
    memorySize: 1024 # More memory for bcrypt operations
    events:
      - httpApi:
          path: /auth/{proxy+}
          method: '*'
      - httpApi:
          path: /user/register
          method: POST
      - httpApi:
          path: /user/login
          method: POST
      - httpApi:
          path: /user/set-password
          method: POST
      - httpApi:
          path: /user/change-password
          method: POST
      - httpApi:
          path: /user/logout
          method: POST
      - httpApi:
          path: /user/logout-all
          method: POST
      - httpApi:
          path: /user/has-password
          method: GET

package:
  # This ensures we only upload what's necessary to keep the package small
  patterns:
    - "!**"
    - "app.js"
    - "lamda.js"
    - "auth-lamda.js"
    - "package.json"
    - "config/**"
    - "controllers/**"
    - "middlewares/**"
    - "models/**"
    - "routes/**"
    - "services/**"
    - "utils/**"
    - "validators/**"
    - "node_modules/**"
    - "package-lock.json"
    - "!.git/**"
    - "!.env" # Excluded because you will add variables manually
    - "!test/**"
    - "!StorageApp-Serverless/**"
