service: StorageApp-Serverless
useDotenv: true

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-south-1
  memorySize: 512
  timeout: 30
  environment:
    # Adding essential env vars here ensures both Lambdas have them
    DB_URL: ${env:DB_URL, ""}
    REDIS_HOST: ${env:REDIS_HOST, ""}
    REDIS_PORT: ${env:REDIS_PORT, ""}
    REDIS_PASSWORD: ${env:REDIS_PASSWORD, ""}
    REDIS_USERNAME: ${env:REDIS_USERNAME, "default"}
    MY_SECRET_KEY: ${env:MY_SECRET_KEY, ""}
    CLIENT_ORIGIN: ${env:CLIENT_ORIGIN, ""}
    BUCKET_NAME: ${env:BUCKET_NAME, ""}
  httpApi:
    cors:
      allowedOrigins:
        - https://cloudvault.cloud
        - https://www.cloudvault.cloud
      allowedHeaders:
        - Content-Type
        - Authorization
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      allowCredentials: true
      maxAge: 600 # 10 minutes

functions:
  api:
    handler: lamda.handler
    events:
      - httpApi:
          path: $default # Catch-all for everything else
          method: '*'

  auth:
    handler: auth-lamda.handler
    memorySize: 1024 # More memory for bcrypt operations
    events:
      - httpApi:
          path: /auth/{proxy+}
          method: '*'
      - httpApi:
          path: /user/register
          method: '*'
      - httpApi:
          path: /user/login
          method: '*'
      - httpApi:
          path: /user/set-password
          method: '*'
      - httpApi:
          path: /user/change-password
          method: '*'
      - httpApi:
          path: /user/logout
          method: '*'
      - httpApi:
          path: /user/logout-all
          method: '*'
      - httpApi:
          path: /user/has-password
          method: '*'

package:
  # This ensures we only upload what's necessary to keep the package small
  patterns:
    - "!**"
    - "app.js"
    - "lamda.js"
    - "auth-lamda.js"
    - "package.json"
    - "config/**"
    - "controllers/**"
    - "middlewares/**"
    - "models/**"
    - "routes/**"
    - "services/**"
    - "utils/**"
    - "validators/**"
    - "node_modules/**"
    - "package-lock.json"
    - "!.git/**"
    - "!.env" # Excluded because you will add variables manually
    - "!test/**"
    - "!StorageApp-Serverless/**"
